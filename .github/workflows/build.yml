name: Apps Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  cpp-build:
    runs-on: [self-hosted, Linux, X64, elxr-sdk]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    outputs:
      branch_key: ${{ steps.artifact-meta.outputs.branch_key }}
      short_sha: ${{ steps.artifact-meta.outputs.short_sha }}
      archive_name: ${{ steps.artifact-meta.outputs.archive_name }}

    steps:
      - name: Checkout apps repo
        uses: actions/checkout@v4

      - name: Build apps on eLxr SDK
        env:
          SIMA_CLI_BIN: /home/sima/.sima-cli/.venv/bin/sima-cli
        run: |
          chmod +x build.sh scripts/ci/check_public_includes.sh
          ./build.sh --all --clean

      - name: Enforce public include boundary
        run: ./scripts/ci/check_public_includes.sh

      - name: Compute archive metadata
        id: artifact-meta
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          ARCHIVE_NAME="neat-apps-${BRANCH_KEY}-${SHORT_SHA}.tar.gz"
          echo "branch_key=${BRANCH_KEY}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Package build output
        run: |
          tar -czf "${{ steps.artifact-meta.outputs.archive_name }}" build

      - name: Upload build archive to Cloudflare R2
        run: |
          aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            "${{ steps.artifact-meta.outputs.archive_name }}" \
            "s3://neat-artifacts/apps/${{ steps.artifact-meta.outputs.archive_name }}"

  portal-build:
    if: github.ref_name == 'main'
    runs-on: [self-hosted, Linux, X64, elxr-sdk]
    needs: cpp-build
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - name: Checkout apps repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal dependencies
        working-directory: portal
        run: npm install

      - name: Build portal
        working-directory: portal
        run: npm run build

      - name: Upload portal build to Cloudflare R2
        run: |
          aws s3 sync \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            portal/dist/ \
            s3://neat-artifacts/apps-portal/ \
            --delete
