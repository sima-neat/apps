name: Apps Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  cpp-build:
    runs-on: [self-hosted, Linux, X64, elxr-sdk]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    outputs:
      branch_key: ${{ steps.artifact-meta.outputs.branch_key }}
      short_sha: ${{ steps.artifact-meta.outputs.short_sha }}
      archive_name: ${{ steps.artifact-meta.outputs.archive_name }}

    steps:
      - name: Checkout apps repo
        uses: actions/checkout@v4

      - name: Build apps on eLxr SDK
        env:
          SIMA_CLI_BIN: /home/sima/.sima-cli/.venv/bin/sima-cli
          NEAT_APPS_ARTIFACT_BRANCH_KEY: ${{ github.head_ref || github.ref_name }}
          NEAT_APPS_ARTIFACT_SHORT_SHA: ${{ github.sha }}
        run: |
          chmod +x build.sh scripts/ci/check_public_includes.sh
          ./build.sh --all --clean

      - name: Enforce public include boundary
        run: ./scripts/ci/check_public_includes.sh

      - name: Capture distribution archive metadata
        id: artifact-meta
        run: |
          mapfile -t archives < <(find . -maxdepth 1 -type f -name 'neat-apps-*.tar.gz' -printf '%f\n' | sort)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "Expected exactly one neat-apps archive, found ${#archives[@]}" >&2
            printf 'Archives:\n%s\n' "${archives[*]-<none>}" >&2
            exit 1
          fi

          ARCHIVE_NAME="${archives[0]}"
          ARCHIVE_STEM="${ARCHIVE_NAME%.tar.gz}"
          SHORT_SHA="${ARCHIVE_STEM##*-}"
          BRANCH_KEY="${ARCHIVE_STEM#neat-apps-}"
          BRANCH_KEY="${BRANCH_KEY%-${SHORT_SHA}}"

          echo "branch_key=${BRANCH_KEY}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload build archive to Cloudflare R2
        run: |
          aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            "${{ steps.artifact-meta.outputs.archive_name }}" \
            "s3://neat-artifacts/download/${{ steps.artifact-meta.outputs.archive_name }}"

  modalix-test:
    runs-on: [self-hosted, Linux, ARM64, modalix]
    needs: cpp-build

    steps:
      - name: Install apps runtime for this branch and commit
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SHORT_SHA="${{ needs.cpp-build.outputs.short_sha }}"

          wget -O /tmp/install-neat-apps-from-a-branch.sh https://apps.sima-neat.com/tools/install-neat-apps.sh
          bash /tmp/install-neat-apps-from-a-branch.sh "${BRANCH_RAW}" "${SHORT_SHA}"

      - name: Locate pyneat
        shell: bash
        run: |
          if [[ -f /media/nvme/pyneat/bin/activate && -x /media/nvme/pyneat/bin/python3 ]]; then
            echo "PYNEAT_ACTIVATE=/media/nvme/pyneat/bin/activate" >> "${GITHUB_ENV}"
            echo "PYTHON_TEST_BIN=/media/nvme/pyneat/bin/python3" >> "${GITHUB_ENV}"
          elif [[ -f "${HOME}/pyneat/bin/activate" && -x "${HOME}/pyneat/bin/python3" ]]; then
            echo "PYNEAT_ACTIVATE=${HOME}/pyneat/bin/activate" >> "${GITHUB_ENV}"
            echo "PYTHON_TEST_BIN=${HOME}/pyneat/bin/python3" >> "${GITHUB_ENV}"
          else
            echo "pyneat virtual environment not found under /media/nvme/pyneat or ${HOME}/pyneat" >&2
            exit 1
          fi

      - name: Install Python test dependencies
        shell: bash
        run: |
          source "${PYNEAT_ACTIVATE}"
          echo "Using Python test interpreter: ${PYTHON_TEST_BIN}"
          "${PYTHON_TEST_BIN}" -m pip install pytest

      - name: Unit Tests
        shell: bash
        env:
          SIMANEAT_APPS_TEST_RTSP_URL: ${{ vars.SIMANEAT_APPS_TEST_RTSP_URL }}
          SIMANEAT_APPS_TEST_RTSP_URLS: ${{ vars.SIMANEAT_APPS_TEST_RTSP_URLS }}
        run: |
          /usr/bin/fix_devkit_runtime.sh
          cd neat-apps/neat-apps-runtime
          source "${PYNEAT_ACTIVATE}"
          source tests/scripts/testing/setup_test_env.sh
          ./tests/test.sh --unit

  publish-index:
    runs-on: ubuntu-latest
    needs: [cpp-build, modalix-test]
    if: github.event_name != 'pull_request'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - name: Write latest.tag for branch
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          SHORT_SHA="${{ needs.cpp-build.outputs.short_sha }}"
          mkdir -p _work/index
          printf '%s\n' "${SHORT_SHA}" > _work/index/latest.tag
          aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            _work/index/latest.tag \
            "s3://neat-artifacts/download/${BRANCH_KEY}/latest.tag"

      - name: Refresh branches.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _work/index
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]

          branches = []
          page = 1
          while True:
            url = f"https://api.github.com/repos/{repo}/branches?per_page=100&page={page}"
            req = urllib.request.Request(
              url,
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req) as resp:
              batch = json.loads(resp.read().decode("utf-8"))
            if not batch:
              break
            branches.extend(str(item.get("name", "")).strip() for item in batch)
            if len(batch) < 100:
              break
            page += 1

          payload = {
            "branches": sorted({branch for branch in branches if branch}),
          }
          Path("_work/index/branches.json").write_text(
            json.dumps(payload, indent=2) + "\n",
            encoding="utf-8",
          )
          print(json.dumps(payload, indent=2))
          PY

          aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            _work/index/branches.json \
            s3://neat-artifacts/download/branches.json \
            --content-type application/json

      - name: Upload install script to Cloudflare R2
        if: github.ref_name == 'main'
        run: |
          mkdir -p _work/tools
          REMOTE_COPY="_work/tools/install-neat-apps.remote.sh"
          REMOTE_URI="s3://neat-artifacts/tools/install-neat-apps.sh"

          if aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            "${REMOTE_URI}" \
            "${REMOTE_COPY}" >/dev/null 2>&1; then
            if cmp -s scripts/install-neat-apps.sh "${REMOTE_COPY}"; then
              echo "install-neat-apps.sh is unchanged; skipping upload."
              exit 0
            fi
          fi

          aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            scripts/install-neat-apps.sh \
            "${REMOTE_URI}" \
            --content-type text/x-shellscript

  portal-build:
    runs-on: ubuntu-latest
    needs: [cpp-build, modalix-test]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - name: Checkout apps repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"


      - name: Install portal dependencies
        working-directory: portal
        run: npm install

      - name: Build portal
        working-directory: portal
        run: npm run build

      - name: Upload portal build to Cloudflare R2
        run: |
          aws s3 sync \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            portal/dist/ \
            s3://neat-artifacts/portal/ \
            --delete

      - name: Purge Cloudflare cache for portal entry files
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          PORTAL_BASE_URL: https://apps.sima-neat.com/portal
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" || -z "${CLOUDFLARE_ZONE_ID}" || -z "${PORTAL_BASE_URL}" ]]; then
            echo "Skipping purge because CLOUDFLARE_API_TOKEN, CLOUDFLARE_ZONE_ID, or PORTAL_BASE_URL is not set."
            exit 0
          fi

          BASE_URL="${PORTAL_BASE_URL%/}"
          curl -fsSL -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @- <<EOF
          {
            "files": [
              "${BASE_URL}/",
              "${BASE_URL}/index.html",
              "${BASE_URL}/catalog.json"
            ]
          }
          EOF
