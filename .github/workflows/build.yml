name: build

on:
  pull_request:
  workflow_dispatch:

jobs:
  cpp-build:
    # Assumes a self-hosted runner with sima-cli + toolchain available.
    runs-on: [self-hosted, Linux]

    steps:
      - name: Checkout apps repo
        uses: actions/checkout@v4

      - name: Install SiMa NEAT core and build
        run: |
          chmod +x build.sh scripts/ci/check_public_includes.sh
          ./build.sh --all --clean

      - name: Enforce public include boundary
        run: ./scripts/ci/check_public_includes.sh
