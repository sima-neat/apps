name: build

on:
  pull_request:
  workflow_dispatch:

jobs:
  cpp-build:
    # Assumes a self-hosted runner with sima-cli + toolchain available.
    runs-on: [self-hosted, Linux]

    steps:
      - name: Checkout apps repo
        uses: actions/checkout@v4

      - name: Install SiMa NEAT core from metadata
        run: |
          chmod +x ci/install_neat_core.sh ci/check_public_includes.sh
          ./ci/install_neat_core.sh

      - name: Enforce public include boundary
        run: ./ci/check_public_includes.sh

      - name: Build C++ examples
        run: |
          chmod +x build.sh
          ./build.sh --clean
